<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>geoAltyn - Тренажер</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: var(--tg-theme-bg-color, #f4f6f9); color: var(--tg-theme-text-color, #222222); margin: 0; padding: 20px; display: flex; flex-direction: column; min-height: 90vh; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .question-counter { font-size: 14px; color: var(--tg-theme-hint-color, #888888); font-weight: bold; }
        .progress-bar { width: 100%; height: 6px; background-color: #e0e0e0; border-radius: 3px; margin-bottom: 30px; }
        .progress-fill { height: 100%; background-color: #0072ff; width: 0%; transition: width 0.3s; }
        .question-container { flex-grow: 1; }
        .question-text { font-size: 20px; font-weight: bold; margin-bottom: 30px; line-height: 1.4; }
        .options-list { display: flex; flex-direction: column; gap: 12px; }
        .option-btn { background-color: var(--tg-theme-secondary-bg-color, #ffffff); border: 2px solid transparent; padding: 16px; border-radius: 12px; font-size: 16px; text-align: left; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .option-selected { border-color: #0072ff; background-color: rgba(0, 114, 255, 0.05); }
        .btn-main { background: linear-gradient(135deg, #00c6ff, #0072ff); color: white; border: none; padding: 16px; border-radius: 12px; font-size: 16px; font-weight: bold; width: 100%; margin-top: 30px; display: none; }
        .loading { text-align: center; color: #888; font-size: 14px; margin-top: 50px; }
        
        .result-container { display: none; text-align: center; padding-top: 40px; }
        .result-circle { width: 120px; height: 120px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 32px; font-weight: bold; color: white; margin: 0 auto 20px auto; }
        .success-bg { background: linear-gradient(135deg, #28a745, #20c997); }
        .fail-bg { background: linear-gradient(135deg, #ff416c, #ff4b2b); }
    </style>
</head>
<body>
    <div id="loadingScreen" class="loading">Сұрақтар жүктелуде... ⏳</div>

    <div id="testScreen" style="display:none;">
        <div class="header"><span class="question-counter" id="qCounter">Сұрақ 1 / 1</span></div>
        <div class="progress-bar"><div class="progress-fill" id="pFill"></div></div>
        <div class="question-container">
            <div class="question-text" id="qText">Сұрақ мәтіні</div>
            <div class="options-list" id="optionsList"></div>
        </div>
        <button class="btn-main" id="nextBtn" onclick="nextQuestion()">Келесі</button>
    </div>

    <div id="resultScreen" class="result-container">
        <div id="resultCircle" class="result-circle">0%</div>
        <h2 id="resultTitle">Нәтиже</h2>
        <p id="resultDesc">...</p>
        <button class="btn-main" style="display:block;" id="finishBtn" onclick="finishTest()">Жалғастыру</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.BackButton.show();
        tg.BackButton.onClick(function() { window.location.href = "course.html"; });

        const API_URL = "https://script.google.com/macros/s/AKfycbyLODP_It9XoMcW60crvOT0deaozO6ircA_CzPhK3w00OT5Ul0kKIFwqGKY2oOGYzvBrQ/exec";
        
        // Телефон жадынан қай сабақтан келгенін оқимыз
        const currentLessonId = localStorage.getItem('currentLessonId') || 1;
        let questions = [];
        let currentQ = 0; let score = 0; let selectedAnswer = -1;

        // Кестеден Сұрақтарды (Questions) тарту
        fetch(API_URL + "?sheet=Questions")
            .then(response => response.json())
            .then(data => {
                document.getElementById('loadingScreen').style.display = 'none';
                
                // Тек осы сабаққа тиесілі сұрақтарды ғана сүзіп алу
                let lessonQuestions = data.filter(q => q.lesson_id == currentLessonId);
                
                if(lessonQuestions.length === 0) {
                    document.getElementById('testScreen').style.display = 'block';
                    document.getElementById('testScreen').innerHTML = "<div class='loading'>Бұл сабаққа сұрақтар әлі қосылмаған.</div>";
                    return;
                }

                // Сұрақтарды бағдарламаға ыңғайлы форматқа ауыстыру
                questions = lessonQuestions.map(q => ({
                    q: q.question_text,
                    options: [q.option_0, q.option_1, q.option_2, q.option_3],
                    correct: parseInt(q.correct_option)
                }));

                document.getElementById('testScreen').style.display = 'block';
                showCurrentQuestion();
            });

        function showCurrentQuestion() {
            document.getElementById('qText').innerText = questions[currentQ].q;
            document.getElementById('qCounter').innerText = "Сұрақ " + (currentQ + 1) + " / " + questions.length;
            document.getElementById('pFill').style.width = ((currentQ + 1) / questions.length * 100) + "%";
            
            let list = document.getElementById('optionsList');
            list.innerHTML = "";
            
            questions[currentQ].options.forEach((opt, index) => {
                let btn = document.createElement('button');
                btn.className = "option-btn";
                btn.innerText = opt;
                btn.onclick = () => selectOption(btn, index);
                list.appendChild(btn);
            });
            
            selectedAnswer = -1;
            document.getElementById('nextBtn').style.display = 'none';
            if(currentQ === questions.length - 1) document.getElementById('nextBtn').innerText = "Аяқтау";
        }

        function selectOption(btn, index) {
            if (tg.HapticFeedback) tg.HapticFeedback.selectionChanged();
            let btns = document.getElementsByClassName('option-btn');
            for(let b of btns) b.classList.remove('option-selected');
            btn.classList.add('option-selected');
            selectedAnswer = index;
            document.getElementById('nextBtn').style.display = 'block';
        }

        function nextQuestion() {
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            if(selectedAnswer === questions[currentQ].correct) score++;
            currentQ++;

            if(currentQ >= questions.length) showResult();
            else showCurrentQuestion();
        }

        function showResult() {
            tg.BackButton.hide();
            document.getElementById('testScreen').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'block';

            let percent = Math.round((score / questions.length) * 100);
            let resCircle = document.getElementById('resultCircle');
            resCircle.innerText = percent + "%";

            if (percent >= 70) {
                resCircle.className = "result-circle success-bg";
                document.getElementById('resultTitle').innerText = "Керемет нәтиже!";
                document.getElementById('finishBtn').style.background = "linear-gradient(135deg, #28a745, #20c997)";
                
                // ТЕСТТЕН ӨТКЕНІ ТУРАЛЫ БОТҚА АҚПАРАТ ЖІБЕРУ
                let resultData = {
                    action: "test_completed",
                    lesson_id: currentLessonId,
                    score: percent,
                    is_passed: true
                };
                tg.sendData(JSON.stringify(resultData));
                
            } else {
                resCircle.className = "result-circle fail-bg";
                document.getElementById('resultTitle').innerText = "Әлі де дайындалу керек";
                document.getElementById('finishBtn').innerText = "Қайта тапсыру";
                document.getElementById('finishBtn').style.background = "linear-gradient(135deg, #ff416c, #ff4b2b)";
            }
        }

        function finishTest() {
            window.location.href = "course.html"; 
        }
    </script>
</body>
</html>
