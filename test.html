<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>geoAltyn - Тренажер</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #f4f6f9);
            color: var(--tg-theme-text-color, #222222);
            margin: 0;
            padding: 20px;
            transition: background-color 0.3s, color 0.3s;
            display: flex;
            flex-direction: column;
            min-height: 90vh;
        }

        /* Жоғарғы бөлік: Прогресс */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .question-counter {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #888888);
            font-weight: bold;
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background-color: #e0e0e0;
            border-radius: 3px;
            margin-bottom: 30px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background-color: #0072ff;
            width: 33%; /* Алғашқы сұрақтың прогресі */
            transition: width 0.3s;
        }

        /* Сұрақ контейнері */
        .question-container {
            flex-grow: 1;
        }
        .question-text {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        /* Жауап нұсқалары */
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option-btn {
            background-color: var(--tg-theme-secondary-bg-color, #ffffff);
            border: 2px solid transparent;
            padding: 16px 20px;
            border-radius: 12px;
            font-size: 16px;
            text-align: left;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            color: inherit;
            transition: all 0.2s;
        }
        .option-btn:active { transform: scale(0.98); }
        
        /* Таңдалған жауап стилі */
        .option-selected {
            border-color: #0072ff;
            background-color: rgba(0, 114, 255, 0.05);
        }

        /* Басты батырма (Келесі) */
        .btn-main {
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            margin-top: 30px;
            display: none; /* Басында жасырынып тұрады */
        }
        .btn-main:active { transform: scale(0.98); }

        /* НӘТИЖЕ ЭКРАНЫ */
        .result-container {
            display: none;
            text-align: center;
            padding-top: 40px;
        }
        .result-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            font-weight: bold;
            color: white;
            margin: 0 auto 20px auto;
        }
        .success-bg { background: linear-gradient(135deg, #28a745, #20c997); }
        .fail-bg { background: linear-gradient(135deg, #ff416c, #ff4b2b); }
        
        .result-container h2 { margin: 0 0 10px 0; }
        .result-container p { color: var(--tg-theme-hint-color, #888888); margin-bottom: 30px; }

        @media (prefers-color-scheme: dark) {
            body { background-color: #181818; color: #ffffff; }
            .option-btn { background-color: #242424; }
            .progress-bar { background-color: #333333; }
        }
    </style>
</head>
<body>

    <div id="testScreen">
        <div class="header">
            <span class="question-counter" id="qCounter">Сұрақ 1 / 3</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="pFill"></div>
        </div>

        <div class="question-container">
            <div class="question-text" id="qText">Еуразия материгінің ең биік нүктесі қалай аталады?</div>
            
            <div class="options-list" id="optionsList">
                <button class="option-btn" onclick="selectOption(this, 0)">Аконкагуа</button>
                <button class="option-btn" onclick="selectOption(this, 1)">Джомолунгма (Эверест)</button>
                <button class="option-btn" onclick="selectOption(this, 2)">Килиманджаро</button>
                <button class="option-btn" onclick="selectOption(this, 3)">Мак-Кинли</button>
            </div>
        </div>

        <button class="btn-main" id="nextBtn" onclick="nextQuestion()">Келесі сұрақ</button>
    </div>

    <div id="resultScreen" class="result-container">
        <div id="resultCircle" class="result-circle success-bg">100%</div>
        <h2 id="resultTitle">Керемет нәтиже!</h2>
        <p id="resultDesc">Сіз бұл тақырыпты толық меңгердіңіз. Келесі сабақтың құлпы ашылды.</p>
        <button class="btn-main" style="display: block;" id="finishBtn" onclick="finishTest()">Жалғастыру</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // Тест сұрақтарының базасы (бұл жерге кейін Google Sheets-тен деректер келеді)
        const questions = [
            {
                q: "Еуразия материгінің ең биік нүктесі қалай аталады?",
                options: ["Аконкагуа", "Джомолунгма (Эверест)", "Килиманджаро", "Мак-Кинли"],
                correct: 1
            },
            {
                q: "Қазақстан қандай материкте орналасқан?",
                options: ["Еуразия", "Африка", "Солтүстік Америка", "Оңтүстік Америка"],
                correct: 0
            },
            {
                q: "Дүние жүзіндегі ең терең көл?",
                options: ["Каспий", "Виктория", "Байкал", "Балқаш"],
                correct: 2
            }
        ];

        let currentQ = 0;
        let score = 0;
        let selectedAnswer = -1;

        // Жауапты таңдау
        function selectOption(btn, index) {
            if (tg.HapticFeedback) tg.HapticFeedback.selectionChanged();
            
            // Барлық батырмалардан таңдалған стилін алып тастау
            let btns = document.getElementsByClassName('option-btn');
            for(let i=0; i<btns.length; i++) {
                btns[i].classList.remove('option-selected');
            }
            // Басылған батырманы белгілеу
            btn.classList.add('option-selected');
            selectedAnswer = index;
            
            // Келесі батырмасын көрсету
            document.getElementById('nextBtn').style.display = 'block';
        }

        // Келесі сұраққа өту немесе нәтижені есептеу
        function nextQuestion() {
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');

            // Дұрыс жауапты тексеру
            if(selectedAnswer === questions[currentQ].correct) {
                score++;
            }

            currentQ++;

            // Егер сұрақтар бітсе
            if(currentQ >= questions.length) {
                showResult();
                return;
            }

            // Келесі сұрақты шығару
            document.getElementById('qText').innerText = questions[currentQ].q;
            document.getElementById('qCounter').innerText = "Сұрақ " + (currentQ + 1) + " / " + questions.length;
            document.getElementById('pFill').style.width = ((currentQ + 1) / questions.length * 100) + "%";
            
            // Жауап нұсқаларын жаңарту
            let btns = document.getElementsByClassName('option-btn');
            for(let i=0; i<btns.length; i++) {
                btns[i].innerText = questions[currentQ].options[i];
                btns[i].classList.remove('option-selected');
            }
            
            selectedAnswer = -1;
            document.getElementById('nextBtn').style.display = 'none'; // Келесі батырмасын жасыру
            
            if(currentQ === questions.length - 1) {
                document.getElementById('nextBtn').innerText = "Аяқтау";
            }
        }

        // 70% ПОРОГ ЛОГИКАСЫ
        function showResult() {
            document.getElementById('testScreen').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'block';

            let percent = Math.round((score / questions.length) * 100);
            document.getElementById('resultCircle').innerText = percent + "%";

            let resCircle = document.getElementById('resultCircle');
            let resTitle = document.getElementById('resultTitle');
            let resDesc = document.getElementById('resultDesc');
            let fBtn = document.getElementById('finishBtn');

            if (percent >= 70) {
                // ӨТТІ
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                resCircle.className = "result-circle success-bg";
                resTitle.innerText = "Керемет нәтиже!";
                resDesc.innerText = "Сіз бұл тақырыпты меңгердіңіз. Келесі сабақтың құлпы ашылды 🔓";
                fBtn.innerText = "Келесі сабаққа өту";
                fBtn.style.background = "linear-gradient(135deg, #28a745, #20c997)";
            } else {
                // ҚҰЛАДЫ
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
                resCircle.className = "result-circle fail-bg";
                resTitle.innerText = "Әлі де дайындалу керек";
                resDesc.innerText = "Келесі сабаққа өту үшін кемінде 70% жинау қажет. Материалды қайталап көріңіз.";
                fBtn.innerText = "Қайта тапсыру";
                fBtn.style.background = "linear-gradient(135deg, #ff416c, #ff4b2b)";
            }
        }

        function finishTest() {
            tg.close(); // Телеграмды жабу немесе басты бетке қайту
        }
    </script>
</body>
</html>
