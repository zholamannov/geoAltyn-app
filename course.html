<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>geoAltyn - Курс модулі</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: var(--tg-theme-bg-color, #f4f6f9); color: var(--tg-theme-text-color, #222222); margin: 0; padding: 20px; }
        .header { margin-bottom: 25px; }
        .header h1 { margin: 0; font-size: 22px; color: #0072ff; }
        .lesson-list { display: flex; flex-direction: column; gap: 15px; }
        .lesson-card { background-color: var(--tg-theme-secondary-bg-color, #ffffff); border-radius: 16px; padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 10px rgba(0,0,0,0.03); cursor: pointer; border-left: 5px solid #28a745; }
        .lesson-info h3 { margin: 0 0 5px 0; font-size: 16px; }
        .lesson-info p { margin: 0; font-size: 13px; color: var(--tg-theme-hint-color, #777777); }
        .icon-play { width: 40px; height: 40px; background: linear-gradient(135deg, #28a745, #20c997); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-size: 18px; }
        .loading { text-align: center; color: #888; font-size: 14px; margin-top: 50px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Курс сабақтары</h1>
    </div>

    <div class="lesson-list" id="lessonList">
        <div class="loading">Сабақтар жүктелуде... ⏳</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.BackButton.show();
        tg.BackButton.onClick(function() { tg.BackButton.hide(); window.location.href = "index.html"; });

        // СІЗДІҢ API СІЛТЕМЕҢІЗ
        const API_URL = "https://script.google.com/macros/s/AKfycbyLODP_It9XoMcW60crvOT0deaozO6ircA_CzPhK3w00OT5Ul0kKIFwqGKY2oOGYzvBrQ/exec";

        // Кестеден Сабақтарды (Lessons) тарту
        fetch(API_URL + "?sheet=Lessons")
            .then(response => response.json())
            .then(data => {
                const list = document.getElementById('lessonList');
                list.innerHTML = ""; // Загрузка текстті өшіру

                if(data.length === 0 || data.error) {
                    list.innerHTML = "<div class='loading'>Сабақтар әлі қосылмаған.</div>";
                    return;
                }

                data.forEach(lesson => {
                    // Әр сабақ үшін карточка жасау
                    let card = document.createElement('div');
                    card.className = "lesson-card";
                    card.innerHTML = `
                        <div class="lesson-info">
                            <h3>${lesson.lesson_id}. ${lesson.title}</h3>
                            <p>Видео және Тест</p>
                        </div>
                        <div class="icon-play">▶</div>
                    `;
                    // Сабақты басқанда не болады?
                    card.onclick = () => {
                        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                        // Қай сабақ таңдалғанын телефон жадына сақтап қоямыз
                        localStorage.setItem('currentLessonId', lesson.lesson_id);
                        localStorage.setItem('currentLessonTitle', lesson.title);
                        window.location.href = "test.html";
                    };
                    list.appendChild(card);
                });
            })
            .catch(error => {
                document.getElementById('lessonList').innerHTML = "<div class='loading'>Қате шықты. Интернетті тексеріңіз.</div>";
            });
    </script>
</body>
</html>
